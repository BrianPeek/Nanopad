name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build
      run: msbuild Nanopad.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /nologo /v:minimal

    - name: Verify output
      if: matrix.configuration == 'Release'
      run: |
        if (!(Test-Path "bin\Release\nanopad.exe")) { throw "Build output not found" }
        $size = (Get-Item "bin\Release\nanopad.exe").Length
        Write-Host "nanopad.exe: $size bytes"
